version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Provides OpenSearch + Dashboards for local search development.
# AWS Bedrock calls still require real AWS credentials via env or ~/.aws.
#
# Usage:
#   docker compose up -d opensearch          # start only OpenSearch
#   docker compose up -d                     # full stack
#   docker compose run --rm etl              # run ETL pipeline once
#   docker compose run --rm app --query "What is aspirin?"

services:

  # ── OpenSearch node (single-node, no security plugin) ──────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true        # Auth disabled for local dev only
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── OpenSearch Dashboards (optional UI) ───────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    profiles:
      - dashboards   # only started with: docker compose --profile dashboards up

  # ── ETL runner (one-shot container) ──────────────────────────────────────
  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    depends_on:
      opensearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_SERVICE=es
    profiles:
      - etl   # run manually: docker compose --profile etl run --rm etl

  # ── Main application (interactive / single-shot) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      opensearch:
        condition: service_healthy
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USE_SSL=false
      - OPENSEARCH_SERVICE=es
    profiles:
      - app   # run manually: docker compose --profile app run --rm app

volumes:
  opensearch-data:
