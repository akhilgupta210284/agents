[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: marks tests that require external services (OpenSearch). Deselect with -m "not integration".
    eval: marks RAGAS evaluation tests that require OpenSearch + optional Bedrock.

# Show short tracebacks and live output
addopts = --tb=short -q
