name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Reusable backend-config helper ───────────────────────────────────────────
# Passed as -backend-config flags; avoids storing sensitive values in .tf files.
env:
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}        # set in repo variables
  TF_LOCK_TABLE:   ${{ vars.TF_LOCK_TABLE || 'medical-agent-tf-lock' }}
  TF_VERSION:      "1.7.5"

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install --no-cache-dir "ruff>=0.4.0"

      - name: Run ruff
        run: ruff check .

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            -r requirements.txt \
            -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit \
            -m "not integration" \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 3. Integration tests ──────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      opensearch:
        image: opensearchproject/opensearch:2.12.0
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          DISABLE_INSTALL_DEMO_CONFIG: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            -r requirements.txt \
            -r requirements-test.txt

      - name: Wait for OpenSearch
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9200/_cluster/health && break
            echo "Retrying ($i/30)…"; sleep 5
          done

      - name: Run integration tests
        env:
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: "9200"
          OPENSEARCH_USE_SSL: "false"
          OPENSEARCH_SERVICE: es
          AWS_REGION: us-east-1
          S3_BUCKET: test-bucket
          AUDIT_LOG_BUCKET: ""
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pytest tests/integration -m integration -v --tb=short

  # ── 4. Docker build smoke test ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: medical-agent:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ETL image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.etl
          push: false
          tags: medical-agent-etl:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Terraform — format + validate (all three environments) ─────────────
  terraform-validate:
    name: "Terraform Validate (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, qa, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Shared layer ──────────────────────────────────────────────────────
      - name: Terraform fmt check (shared)
        working-directory: terraform/shared
        run: terraform fmt -check -recursive

      - name: Terraform init (shared — local backend)
        working-directory: terraform/shared
        run: terraform init -backend=false

      - name: Terraform validate (shared)
        working-directory: terraform/shared
        run: terraform validate

      # ── Environment layer ─────────────────────────────────────────────────
      - name: Terraform fmt check (${{ matrix.environment }})
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform fmt -check -recursive

      - name: Terraform init (${{ matrix.environment }} — no backend auth needed for validate)
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate (${{ matrix.environment }})
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      # ── Module linting ────────────────────────────────────────────────────
      - name: Terraform fmt check (modules)
        working-directory: terraform/modules
        run: terraform fmt -check -recursive

  # ── 6. Terraform plan — preview infra changes (PR only) ───────────────────
  terraform-plan:
    name: "Terraform Plan (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: terraform-validate
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, qa, prod]

    permissions:
      id-token: write
      contents: read
      pull-requests: write      # write plan output as a PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_DEPLOY_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Terraform init (${{ matrix.environment }})
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=environments/${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan (${{ matrix.environment }})
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -var="ecr_app_image_url=${{ vars.ECR_APP_IMAGE_URL }}" \
            -var="ecr_etl_image_url=${{ vars.ECR_ETL_IMAGE_URL }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(
              'terraform/environments/${{ matrix.environment }}/plan-output.txt', 'utf8'
            ).substring(0, 60000);   // GitHub comment size limit
            const body = `### Terraform Plan — \`${{ matrix.environment }}\`
            \`\`\`hcl
            ${plan}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
